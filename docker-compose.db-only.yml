# Starts only Postgres + Redis — for dev when running the API + app locally.
# Exposes ports on all interfaces so the API on another machine (or WSL) can reach them.
# Usage: docker compose -f docker-compose.db-only.yml up -d

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hookgenos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hookgenos}
      POSTGRES_DB: ${POSTGRES_DB:-hookgenos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hookgenos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
